name: Metrics
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}

          # Linguagens mais usadas (analisa seus repos de verdade)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Hábitos de commit (horários, dias, mensagens)
          plugin_habits: yes
          plugin_habits_charts_type: graph
          plugin_habits_days: 60
          plugin_habits_facts: yes

          # Calendário de contribuições em 3D isométrico
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Linhas de código adicionadas/removidas (baseado em git, não wakatime)
          plugin_lines: yes

          # Followers, repos, PRs, issues — contexto geral de atividade
          plugin_followup: yes
